name: Quarkus Version Sync and Build

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'quarkus-eda-demo/pom.xml'
      - 'quarkus-eda-knative-demo/pom.xml'

permissions:
  contents: write
  pull-requests: write

jobs:
  sync-versions:
    name: Sync Quarkus Versions
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'

      - name: Extract Quarkus version from quarkus-eda-demo
        id: extract-version-demo
        run: |
          VERSION=$(grep -oP '<quarkus.platform.version>\K[^<]+' quarkus-eda-demo/pom.xml)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Extracted version from quarkus-eda-demo: $VERSION"

      - name: Extract Quarkus version from quarkus-eda-knative-demo
        id: extract-version-knative
        run: |
          VERSION=$(grep -oP '<quarkus.platform.version>\K[^<]+' quarkus-eda-knative-demo/pom.xml)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Extracted version from quarkus-eda-knative-demo: $VERSION"

      - name: Determine which project was updated
        id: determine-project
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEMO_VERSION: ${{ steps.extract-version-demo.outputs.version }}
          KNATIVE_VERSION: ${{ steps.extract-version-knative.outputs.version }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          # Get list of changed files in this PR using GitHub API
          CHANGED_FILES=$(gh pr view "${PR_NUMBER}" --json files --jq '.files[].path')
          
          echo "Changed files in this PR:"
          echo "${CHANGED_FILES}"
          
          if echo "${CHANGED_FILES}" | grep -q "quarkus-eda-demo/pom.xml"; then
            echo "updated_project=quarkus-eda-demo" >> $GITHUB_OUTPUT
            echo "new_version=${DEMO_VERSION}" >> $GITHUB_OUTPUT
            echo "Dependabot updated quarkus-eda-demo to version ${DEMO_VERSION}"
          elif echo "${CHANGED_FILES}" | grep -q "quarkus-eda-knative-demo/pom.xml"; then
            echo "updated_project=quarkus-eda-knative-demo" >> $GITHUB_OUTPUT
            echo "new_version=${KNATIVE_VERSION}" >> $GITHUB_OUTPUT
            echo "Dependabot updated quarkus-eda-knative-demo to version ${KNATIVE_VERSION}"
          else
            echo "No relevant pom.xml changes detected"
            exit 0
          fi

      - name: Update application.properties in quarkus-eda-demo
        if: steps.determine-project.outputs.updated_project == 'quarkus-eda-demo'
        run: |
          NEW_VERSION="${{ steps.determine-project.outputs.new_version }}"
          sed -i "s/quarkus.container-image.tag=.*/quarkus.container-image.tag=$NEW_VERSION/" quarkus-eda-demo/src/main/resources/application.properties
          echo "Updated application.properties with version $NEW_VERSION"

      - name: Update 02-keda-deployment.yaml in quarkus-eda-demo
        if: steps.determine-project.outputs.updated_project == 'quarkus-eda-demo'
        run: |
          NEW_VERSION="${{ steps.determine-project.outputs.new_version }}"
          sed -i "s|image: quay.io/danieloh30/quarkus-eda-demo:.*|image: quay.io/danieloh30/quarkus-eda-demo:$NEW_VERSION|" quarkus-eda-demo/kube/02-keda-deployment.yaml
          echo "Updated 02-keda-deployment.yaml with version $NEW_VERSION"

      - name: Commit version sync changes
        if: steps.determine-project.outputs.updated_project != ''
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          git add quarkus-eda-demo/src/main/resources/application.properties
          git add quarkus-eda-demo/kube/02-keda-deployment.yaml
          
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: sync version ${{ steps.determine-project.outputs.new_version }} across configuration files"
            git push
          fi

  build-and-push:
    name: Build and Push Container Image
    runs-on: ubuntu-latest
    needs: sync-versions
    if: github.actor == 'dependabot[bot]'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'

      - name: Wait for version sync commit
        run: |
          echo "Waiting for version sync to complete..."
          sleep 10

      - name: Pull latest changes
        run: |
          git pull origin ${{ github.head_ref }}

      - name: Login to Quay.io
        uses: docker/login-action@v3
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}

      - name: Build and push quarkus-eda-demo
        working-directory: quarkus-eda-demo
        run: |
          ./mvnw clean package -DskipTests \
            -Dquarkus.container-image.build=true \
            -Dquarkus.container-image.push=true
          echo "Successfully built and pushed quarkus-eda-demo container image"

  auto-merge:
    name: Auto-merge Dependabot PR
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.actor == 'dependabot[bot]'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Enable auto-merge
        run: |
          gh pr merge --auto --squash "${{ github.event.pull_request.number }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Approve PR
        run: |
          gh pr review --approve "${{ github.event.pull_request.number }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

